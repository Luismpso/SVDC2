name: Daily Data Update

on:
  schedule:
    # Corre todos os dias às 08:00 UTC
    - cron: '0 8 * * *'
  workflow_dispatch:  # permite correr manualmente a partir do separador Actions

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # necessário para fazer commit/push de volta ao repo
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Update Brent
        run: python api/brent.py
        continue-on-error: true

      - name: Update combustíveis PT
        run: python api/combustiveis.py
        continue-on-error: true

      - name: Update inflação 
        run: python api/inflacao.py
        continue-on-error: true

      - name: Update chokepoints
        run: python api/fluxos.py
        continue-on-error: true

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "Data Update Bot"
          git add data/processed/*.csv
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "data: update $(date -u +'%Y-%m-%d')"
            git push
          fi
